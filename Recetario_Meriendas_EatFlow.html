<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetario de Meriendas Saludables | eat&flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --verde: #1a5945;
    --verde-claro: #8bc34a;
    --naranja: #ff9800;
    --crema: #f7f4ef;
    --cafe: #3d2b1f;
    --rosa: #c2185b;
    --card-bg: #ffffff;
    --sombra: 0 2px 20px rgba(26,89,69,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--crema);
    color: var(--cafe);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: linear-gradient(160deg, var(--verde) 0%, #2D6B58 60%, #1a4030 100%);
    color: white;
    padding: 48px 24px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(139,195,74,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(255,152,0,0.1) 0%, transparent 50%);
  }
  .hero-content { position: relative; z-index: 1; }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 8vw, 52px);
    color: var(--verde-claro);
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .logo span { color: white; }
  .hero-sub {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .hero p {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* FILTROS */
  .filter-wrap {
    background: white;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .filter-scroll {
    display: flex;
    overflow-x: auto;
    padding: 14px 20px;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 30px;
    border: 1.5px solid #e0e0e0;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--verde); color: var(--verde); }
  .filter-btn.active {
    background: var(--verde);
    border-color: var(--verde);
    color: white;
  }
  .filter-btn.cat-dulce.active { background: var(--rosa); border-color: var(--rosa); }
  .filter-btn.cat-salado.active { background: var(--verde); }
  .filter-btn.cat-helado.active { background: #0288d1; border-color: #0288d1; }
  .filter-btn.cat-especial.active { background: var(--naranja); border-color: var(--naranja); }
  .filter-btn.cat-deportivo.active { background: #6a1b9a; border-color: #6a1b9a; }

  /* BUSCADOR */
  .search-wrap { padding: 0 20px 14px; background: white; }
  .search-input {
    width: 100%;
    padding: 10px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--cafe);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--verde); }
  .search-input::placeholder { color: #bbb; }

  /* GRID */
  .grid-wrap { padding: 28px 20px 60px; max-width: 1000px; margin: 0 auto; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--verde-claro);
    margin-bottom: 16px;
    margin-top: 32px;
    padding-left: 2px;
  }
  .section-label:first-child { margin-top: 0; }
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .recipe-card {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: var(--sombra);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
    border: 1.5px solid transparent;
  }
  .recipe-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(26,89,69,0.14); }
  .recipe-card:active { transform: scale(0.98); }
  .card-top {
    height: 6px;
    background: var(--verde-claro);
  }
  .cat-dulce .card-top { background: linear-gradient(90deg, var(--rosa), #f06292); }
  .cat-salado .card-top { background: linear-gradient(90deg, var(--verde), var(--verde-claro)); }
  .cat-helado .card-top { background: linear-gradient(90deg, #0288d1, #4fc3f7); }
  .cat-especial .card-top { background: linear-gradient(90deg, var(--naranja), #ffcc02); }
  .cat-deportivo .card-top { background: linear-gradient(90deg, #6a1b9a, #ab47bc); }

  .card-body { padding: 18px 20px 20px; }
  .card-num {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: #ccc;
    margin-bottom: 4px;
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--verde);
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .tag-dulce { background: #fce4ec; color: var(--rosa); }
  .tag-salado { background: #e8f5e9; color: #2e7d32; }
  .tag-helado { background: #e1f5fe; color: #01579b; }
  .tag-especial { background: #fff3e0; color: #e65100; }
  .tag-deportivo { background: #f3e5f5; color: #6a1b9a; }
  .tag-ansiedad { background: #e8eaf6; color: #3949ab; }

  .card-macros {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    background: #f7f9f8;
    border-radius: 10px;
    padding: 10px 8px;
  }
  .macro-item { text-align: center; }
  .macro-val { font-size: 15px; font-weight: 700; color: var(--verde); display: block; }
  .macro-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; font-weight: 600; }

  .card-arrow {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--verde-claro);
    gap: 4px;
  }
  .card-arrow svg { width: 14px; height: 14px; transition: transform 0.2s; }
  .recipe-card:hover .card-arrow svg { transform: translateX(4px); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,40,30,0.6);
    z-index: 1000;
    padding: 16px;
    overflow-y: auto;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    margin: auto;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid #f0f0f0;
    position: relative;
  }
  .modal-num { font-size: 12px; color: #ccc; font-family: 'DM Serif Display', serif; margin-bottom: 4px; }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--verde);
    line-height: 1.2;
    padding-right: 36px;
  }
  .modal-close {
    position: absolute;
    top: 22px;
    right: 22px;
    width: 34px;
    height: 34px;
    border: none;
    background: #f5f5f5;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    transition: background 0.2s;
  }
  .modal-close:hover { background: #e0e0e0; }
  .modal-body { padding: 24px 28px 32px; }
  .modal-macros {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 10px;
    background: linear-gradient(135deg, #f0f7f3, #e8f5e9);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .modal-macro-item { text-align: center; }
  .modal-macro-val { font-size: 22px; font-weight: 800; color: var(--verde); display: block; }
  .modal-macro-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; font-weight: 600; margin-top: 2px; }

  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--verde-claro);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .modal-section-title:first-of-type { margin-top: 0; }

  .ingredientes-list { list-style: none; }
  .ingredientes-list li {
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f5;
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .ingredientes-list li::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--verde-claro);
    flex-shrink: 0;
    margin-top: 6px;
  }
  .ingredientes-list li:last-child { border-bottom: none; }

  .prep-text {
    font-size: 14px;
    line-height: 1.8;
    color: #555;
    background: #fafafa;
    border-radius: 10px;
    padding: 14px 16px;
  }

  .modal-nota {
    margin-top: 16px;
    background: #fff8e1;
    border-left: 3px solid var(--naranja);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #795548;
    line-height: 1.6;
  }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }

  /* FOOTER */
  .footer {
    background: var(--verde);
    color: white;
    text-align: center;
    padding: 28px 20px;
    font-size: 13px;
  }
  .footer a { color: var(--verde-claro); text-decoration: none; font-weight: 600; }

  @media (max-width: 480px) {
    .recipe-grid { grid-template-columns: 1fr; }
    .hero { padding: 36px 20px 48px; }
    .modal-body { padding: 20px 20px 28px; }
    .modal-header { padding: 22px 20px 16px; }
    .modal-macros { gap: 6px; padding: 12px; }
    .modal-macro-val { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <div class="logo">eat<span>&flow</span></div>
    <p class="hero-sub">Nutrición Deportiva</p>
    <h1>Recetario de Meriendas Saludables</h1>
    <p>Opciones altas en proteína y fibra, bajas en azúcares refinados, para controlar la ansiedad y apoyar la pérdida de grasa.</p>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-scroll">
    <button class="filter-btn active" onclick="filtrar('todos',this)">Todas</button>
    <button class="filter-btn cat-dulce" onclick="filtrar('dulce',this)">Dulces</button>
    <button class="filter-btn cat-salado" onclick="filtrar('salado',this)">Saladas</button>
    <button class="filter-btn cat-helado" onclick="filtrar('helado',this)">Helados</button>
    <button class="filter-btn cat-especial" onclick="filtrar('especial',this)">Dulce Sano Especial</button>
    <button class="filter-btn cat-deportivo" onclick="filtrar('deportivo',this)">Pre-entreno</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Buscar receta..." oninput="buscar(this.value)">
  </div>
</div>

<div class="grid-wrap" id="grid"></div>

<div class="modal-overlay" id="modal" onclick="cerrarModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div class="footer">
  <p>Nutricionista Isabel Herra &nbsp;|&nbsp; <a href="tel:+50683129092">(506) 8312-9092</a></p>
  <p style="margin-top:6px;opacity:0.6;font-size:11px">eat&amp;flow Nutrición Deportiva</p>
</div>

// Estado
let filtroActivo = 'todos';
let busqueda = '';

function filtrar(cat, btn) {
  filtroActivo = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function buscar(texto) {
  busqueda = texto.toLowerCase();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let filtradas = recetas.filter(r => {
    const matchCat = filtroActivo === 'todos' || r.cat === filtroActivo;
    const matchBusq = !busqueda || r.titulo.toLowerCase().includes(busqueda) || r.tags.some(t => t.includes(busqueda));
    return matchCat && matchBusq;
  });

  if (filtradas.length === 0) {
    grid.innerHTML = '<div class="no-results">No se encontraron recetas con esa búsqueda.</div>';
    return;
  }

  // Agrupar por categoria para mostrar labels
  const grupos = {};
  const labelsMap = {
    dulce: 'Dulces y postres',
    salado: 'Saladas y proteicas',
    helado: 'Helados saludables',
    especial: 'Dulce sano especial',
    deportivo: 'Pre-entreno y recuperación'
  };
  filtradas.forEach(r => {
    if (!grupos[r.cat]) grupos[r.cat] = [];
    grupos[r.cat].push(r);
  });

  let html = '';
  for (const cat in grupos) {
    if (filtroActivo === 'todos') {
      html += `<div class="section-label">${labelsMap[cat] || cat}</div>`;
    }
    html += `<div class="recipe-grid">`;
    grupos[cat].forEach(r => {
      const tagHtml = r.tags.map(t => `<span class="tag tag-${t}">${t === 'ansiedad' ? 'anti-ansiedad' : t === 'deportivo' ? 'pre-entreno' : t === 'especial' ? 'especial' : t}</span>`).join('');
      html += `
        <div class="recipe-card cat-${r.cat}" onclick="abrirModal(${r.id})">
          <div class="card-top"></div>
          <div class="card-body">
            <div class="card-num">Receta ${r.num}</div>
            <div class="card-title">${r.titulo}</div>
            <div class="card-tags">${tagHtml}</div>
            <div class="card-macros">
              <div class="macro-item"><span class="macro-val">${r.calorias}</span><span class="macro-lbl">kcal</span></div>
              <div class="macro-item"><span class="macro-val">${r.proteina}g</span><span class="macro-lbl">prot</span></div>
              <div class="macro-item"><span class="macro-val">${r.carbs}g</span><span class="macro-lbl">carbs</span></div>
              <div class="macro-item"><span class="macro-val">${r.grasas}g</span><span class="macro-lbl">grasas</span></div>
            </div>
            <div class="card-arrow">Ver receta <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  grid.innerHTML = html;
}

function abrirModal(id) {
  const r = recetas.find(x => x.id === id);
  if (!r) return;
  const tagHtml = r.tags.map(t => `<span class="tag tag-${t}">${t === 'ansiedad' ? 'anti-ansiedad' : t === 'deportivo' ? 'pre-entreno' : t === 'especial' ? 'especial' : t}</span>`).join('');
  const ingsHtml = r.ingredientes.map(i => `<li>${i}</li>`).join('');
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-num">Receta ${r.num}</div>
      <div class="modal-title">${r.titulo}</div>
      <div class="card-tags" style="margin-top:8px">${tagHtml}</div>
      ${r.porciones ? `<p style="font-size:12px;color:#aaa;margin-top:6px">${r.porciones}</p>` : ''}
      <button class="modal-close" onclick="cerrarModalBtn()">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="modal-macros">
        <div class="modal-macro-item"><span class="modal-macro-val">${r.calorias}</span><span class="modal-macro-lbl">Calorías</span></div>
        <div class="modal-macro-item"><span class="modal-macro-val">${r.proteina}g</span><span class="modal-macro-lbl">Proteína</span></div>
        <div class="modal-macro-item"><span class="modal-macro-val">${r.carbs}g</span><span class="modal-macro-lbl">Carbohidratos</span></div>
        <div class="modal-macro-item"><span class="modal-macro-val">${r.grasas}g</span><span class="modal-macro-lbl">Grasas</span></div>
      </div>
      <div class="modal-section-title">Ingredientes</div>
      <ul class="ingredientes-list">${ingsHtml}</ul>
      <div class="modal-section-title">Preparación</div>
      <div class="prep-text">${r.prep}</div>
      ${r.nota ? `<div class="modal-nota">${r.nota}</div>` : ''}
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModalBtn() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function cerrarModal(e) {
  if (e.target === document.getElementById('modal')) cerrarModalBtn();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModalBtn(); });

renderGrid();
</script>
